<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">Color Palette Generator</p>
        <h1>Generate fresh color palettes instantly.</h1>
        <p>Tap the button to create a new palette of beautiful HEX colors. Copy any code with one click.</p>
      </div>
      <button class="action-btn" id="generateBtn">Generate Palette</button>
    </section>

    <section class="palette-grid" id="paletteGrid" aria-live="polite"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
